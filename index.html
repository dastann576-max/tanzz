<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TANZZ KINGNOKOS V11</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
padding-bottom:100px;
}

:root{
--red:#ff2020;
--card:#0d0d0d;
}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
width:90%;
max-width:350px;
background:#0d0d0d;
padding:25px;
border-radius:20px;
border:1px solid #222;
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:var(--red);
}

.login-box input{
width:100%;
padding:12px;
margin:8px 0;
background:#111;
border:none;
border-radius:12px;
color:white;
}

.login-box button{
width:100%;
padding:12px;
background:var(--red);
border:none;
color:white;
font-weight:bold;
border-radius:12px;
}

.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(180deg,#111,#000);
}

.profile{
display:flex;
align-items:center;
gap:12px;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid var(--red);
box-shadow:0 0 20px red;
}

.balance{
padding:15px;
border:2px solid var(--red);
border-radius:20px;
font-weight:bold;
box-shadow:0 0 20px red;
}

.container{
padding:15px;
}

.search{
width:100%;
padding:15px;
border:none;
background:#111;
border-radius:15px;
color:white;
margin-bottom:15px;
}

.banner{
width:100%;
border-radius:20px;
box-shadow:0 0 25px red;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.menu{
background:var(--card);
padding:20px;
border-radius:20px;
text-align:center;
border:1px solid #222;
}

.menu h3{
margin-top:10px;
}

.deposit{
margin-top:20px;
background:#0d0d0d;
padding:20px;
border-radius:20px;
}

.deposit button{
width:100%;
padding:15px;
background:var(--red);
border:none;
border-radius:15px;
font-weight:bold;
color:white;
margin-top:10px;
}

.buy{
margin-top:20px;
}

.buy button{
width:100%;
padding:15px;
background:#25D366;
border:none;
border-radius:15px;
font-weight:bold;
color:white;
}

.riwayat{
margin-top:20px;
background:#0d0d0d;
padding:20px;
border-radius:20px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#050505;
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #222;
}

.bottom a{
text-decoration:none;
color:white;
font-size:14px;
}
</style>
</head>

<body>

<div id="loginPage">
<div class="login-box">
<h2>LOGIN TANZZ</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="login()">MASUK</button>

</div>
</div>

<div class="header">

<div class="profile">
<img src="logo.png">

<div>
<h1>TANZZ</h1>
<h2 style="color:red;">KINGNOKOS</h2>
<p>Layanan Digital Premium</p>
</div>

</div>

<div class="balance">
Rp <span id="saldo">50000</span>
</div>

</div>

<div class="container">

<input class="search" placeholder="Cari layanan...">

<img src="banner.jpg" class="banner">

<div class="menu-grid">

<div class="menu">
📱
<h3>NOKOS</h3>
</div>

<div class="menu">
🚀
<h3>SUNTIK SOSMED</h3>
</div>

<div class="menu">
💳
<h3>TOP UP</h3>
</div>

<div class="menu">
💰
<h3>DEPOSIT</h3>
</div>

</div>

<div class="deposit">
<h2>Deposit Saldo</h2>
<button onclick="deposit()">DEPOSIT SEKARANG</button>
</div>

<div class="buy">
<button onclick="window.open('https://wa.me/6281234567890')">
BELI VIA WHATSAPP
</button>
</div>

<div class="riwayat">
<h2>Riwayat Transaksi</h2>
<p>Belum ada transaksi.</p>
</div>

</div>

<div class="bottom">
<a href="#">🏠 Home</a>
<a href="#">👤 Login</a>
<a href="#">🛒 Order</a>
<a href="#">⚙ Profil</a>
</div>

<script>

function login(){
document.getElementById("loginPage").style.display="none";
}

function deposit(){

let nominal = prompt("Masukkan nominal deposit");

if(nominal){

alert("Deposit Rp " + nominal + " berhasil dibuat");

}

}

</script>

</body>
</html>
